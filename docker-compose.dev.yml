services:
  oph26-database:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oph26_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oph26_password}
      POSTGRES_DB: ${POSTGRES_DB:-oph26_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-oph26_user} -d ${POSTGRES_DB:-oph26_db}",
        ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  db_data:
