      format: uuid
      type: string
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      description: >-
        ใช้ JWT (JSON Web Token) สำหรับการยืนยันตัวตน ผู้ใช้ต้องส่ง Access Token
        ใน Header `Authorization: Bearer <access_token>`
      scheme: bearer
      type: http
security:
  - bearerAuth: []
