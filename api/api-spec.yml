          description: Access Token ที่ใช้สำหรับการยืนยันตัวตนใน API
          type: string
        refreshToken:
          description: >-
            Refresh Token ที่ใช้สำหรับแลก Access Token ใหม่เมื่อหมดอายุ
            ส่งให้ซ้ำเฉย ๆ แต่แนะนำให้ใช้ค่าจาก Cookie HttpOnly
          type: string
      type: object
